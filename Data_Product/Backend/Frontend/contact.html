    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav>
        <div class="logo">MINISTRY OF AGE</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="predict.html">The Predictor</a></li>
            <li><a href="ministers.html">Meet The Ministers</a></li>
            <li><a href="how-it-works.html">Philosophy</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <header class="hero-white" style="padding: 4rem 5% 2rem; border-bottom: 5px solid #000;">
        <h1>CONTACT<br>THE MINISTRY</h1>
        <p>Inquiries & Collaboration</p>
    </header>

    <section style="background-color: var(--bg-dark); padding: 4rem 5% 6rem; min-height: 60vh; text-align: center;">
        <div style="max-width: 600px; margin: 0 auto;">
            <p style="color: #fff; margin-bottom: 3rem; font-size: 1.1rem;">
                The Ministry is open to scientific collaboration and data partnerships.
            </p>

            <form style="text-align: left;">
                <div style="margin-bottom: 2rem;">
                    <label
                        style="display: block; color: #888; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em;">Name</label>
                    <input type="text" class="form-control"
                        style="width: 100%; padding: 1rem; background: #111; border: 1px solid #333; color: #fff;">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label
                        style="display: block; color: #888; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em;">Email</label>
                    <input type="email" class="form-control"
                        style="width: 100%; padding: 1rem; background: #111; border: 1px solid #333; color: #fff;">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label
                        style="display: block; color: #888; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em;">Message</label>
                    <textarea class="form-control" rows="5"
                        style="width: 100%; padding: 1rem; background: #111; border: 1px solid #333; color: #fff;"></textarea>
                </div>
                <button type="button" class="btn-primary"
                    style="width: 100%; background: #fff; color: #000; border-color: #fff;">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Ministry of Age. Inspired by The Ministry of Crab.</p>
    </footer>
</body>
